actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket or other server-push protocol surface exists anywhere in
    USAspending's own API Blueprint contracts or public documentation. Every
    documented endpoint - including the asynchronous Bulk Download workflow
    - is plain request/response REST over HTTPS, either GET with path/query
    parameters or POST with a JSON filter body. No AsyncAPI document was
    created because there is no server-push transport on USAspending's own
    API to model.
