    filters across the rest of the API - toptier agency listings with
    budgetary-resources share, plus autocomplete lookups for awarding/funding
    agencies and sub-agency offices, recipients, CFDA assistance listings,
    NAICS and PSC codes, locations, and glossary terms.
- aid: usaspending:usaspending-subawards-api
  name: USAspending Subawards API
  tags:
  - Subawards
  - Transactions
  - Prime Awards
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://api.usaspending.gov/docs/endpoints
  baseURL: https://api.usaspending.gov/api/v2
  properties:
  - url: https://api.usaspending.gov/docs/endpoints
    type: Documentation
  - url: https://github.com/fedspendingtransparency/usaspending-api/blob/master/usaspending_api/api_contracts/contracts/v2/subawards.md
    type: APIReference
  - url: openapi/usaspending-openapi.yml
    type: OpenAPI
  description: Paged, sortable listing of subawards (pass-through awards from a
    prime recipient to a subrecipient) scoped to a given prime award ID -
    subaward number, description, action date, amount, and subrecipient name.
    Powers the Sub-Awards tab on the USAspending.gov award profile page.
