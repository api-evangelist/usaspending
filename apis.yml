  - url: https://github.com/fedspendingtransparency/usaspending-api/blob/master/usaspending_api/api_contracts/contracts/v2/budget_functions/list_budget_functions.md
    type: APIReference
  - url: openapi/usaspending-openapi.yml
    type: OpenAPI
  description: Reference listings of the federal budget's functional
    classification - budget functions and budget subfunctions (for example,
    National Defense, Health, Income Security) used to categorize and filter
    agency budgetary resources across the federal government.
- aid: usaspending:usaspending-disaster-emergency-funding-api
  name: USAspending Disaster/Emergency Funding (COVID-19) API
  tags:
  - Disaster
  - Emergency Funding
  - COVID-19
  - DEFC
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://api.usaspending.gov/docs/endpoints
  baseURL: https://api.usaspending.gov/api/v2
  properties:
  - url: https://api.usaspending.gov/docs/endpoints
    type: Documentation
  - url: https://github.com/fedspendingtransparency/usaspending-api/blob/master/usaspending_api/api_contracts/contracts/v2/disaster/overview.md
    type: APIReference
  - url: openapi/usaspending-openapi.yml
    type: OpenAPI
  description: Funding and spending detail for emergency and disaster
    supplemental appropriations, tracked by Disaster Emergency Fund Code
    (DEFC) - including the CARES Act and other COVID-19 relief legislation.
    Breaks down total budget authority, obligations, and outlays by agency,
    award, CFDA program, federal account, object class, recipient, and
    geography.
- aid: usaspending:usaspending-bulk-download-api
  name: USAspending Bulk Download API
  tags:
  - Bulk Download
  - CSV
  - Data Export
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://api.usaspending.gov/docs/endpoints
  baseURL: https://api.usaspending.gov/api/v2
  properties:
  - url: https://api.usaspending.gov/docs/endpoints
    type: Documentation
  - url: https://github.com/fedspendingtransparency/usaspending-api/blob/master/usaspending_api/api_contracts/contracts/v2/bulk_download/awards.md
    type: APIReference
  - url: openapi/usaspending-openapi.yml
    type: OpenAPI
  description: Asynchronous bulk export of filtered award, account, and
    transaction data as zipped CSV, TSV, or pipe-delimited text files.
    A request kicks off zip-file generation on the backend; a companion status
    endpoint is polled until the file is ready for download. Also lists
    agencies and monthly generated files available for download. Powers the
    USAspending.gov Custom Award Data Download page.
- aid: usaspending:usaspending-references-autocomplete-api
  name: USAspending References & Autocomplete API
  tags:
  - References
  - Autocomplete
  - Agencies
  - NAICS
  - CFDA
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://api.usaspending.gov/docs/endpoints
