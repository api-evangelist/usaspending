  - url: openapi/usaspending-openapi.yml
    type: OpenAPI
  description: Federal account and child Treasury Account Symbol (TAS) data for
    a given fiscal year - account title, parent agency and bureau, and
    aggregated obligated, gross outlay, and budgetary resources amounts.
