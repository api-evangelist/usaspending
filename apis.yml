aid: usaspending
url: https://raw.githubusercontent.com/api-evangelist/usaspending/refs/heads/main/apis.yml
name: USAspending.gov
kind: government
description: USAspending.gov is the official open data source of federal spending
  information operated by the U.S. Department of the Treasury's Bureau of the
  Fiscal Service, implementing the DATA Act's transparency mandate. The
  underlying USAspending API (api.usaspending.gov) is a free, public, unauthenticated
  REST API that exposes federal contracts, grants, loans, direct payments, and
  other financial assistance awards, along with agency budgets, federal account
  and Treasury Account Symbol data, recipient profiles, and COVID-19 / disaster
  emergency relief spending. Most search and listing endpoints accept a POST
  with a JSON filter object rather than query parameters, given the complexity
  of the filter combinations; simpler lookup endpoints use GET with path
  parameters. The API and the usaspending-api server are open source.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Government
- Federal Spending
- Open Data
- Contracts
- Grants
- DATA Act
- Transparency
- Public Sector
created: '2026-07-03'
modified: '2026-07-03'
specificationVersion: '0.19'
apis:
- aid: usaspending:usaspending-awards-search-api
  name: USAspending Awards Search API
  tags:
  - Awards
  - Search
  - Contracts
  - Grants
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://api.usaspending.gov/docs/endpoints
  baseURL: https://api.usaspending.gov/api/v2
  properties:
  - url: https://api.usaspending.gov/docs/endpoints
    type: Documentation
  - url: https://github.com/fedspendingtransparency/usaspending-api/blob/master/usaspending_api/api_contracts/contracts/v2/search/spending_by_award.md
    type: APIReference
  - url: openapi/usaspending-openapi.yml
    type: OpenAPI
  description: Advanced search across federal award spending (contracts, IDVs,
    grants, loans, direct payments, other financial assistance). Accepts a
    complex JSON filter object (award type, agency, recipient, time period,
    place of performance, NAICS/PSC, keyword, and more) plus a requested field
    list, and returns paged, sortable award or subaward records. Powers the
    USAspending.gov Advanced Search page, spending-by-category, spending-by-
    geography, and spending-over-time breakdowns.
- aid: usaspending:usaspending-agency-api
  name: USAspending Agency API
  tags:
